# Production stack: postgres + node server + caddy edge.
#
# The dev compose (docker-compose.yml) still exposes postgres on :5432 and the
# server on :3001 for laptop work. This file does neither — only Caddy is
# reachable from the network (80/443), everything else is internal.
#
# Required env in .env.production at repo root:
#   DOMAIN          fully-qualified hostname (e.g. vellin.ru)
#   JWT_SECRET      >=32 chars, generate with `openssl rand -hex 32`
#   DB_PASSWORD     postgres password, generate with `openssl rand -base64 24`

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vellin
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env.production}
      POSTGRES_DB: vellin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'vellin']
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://vellin:${DB_PASSWORD}@postgres:5432/vellin
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env.production}
      PORT: '3001'
      HOST: '0.0.0.0'
      NODE_ENV: production
      CORS_ORIGIN: https://${DOMAIN:?DOMAIN must be set in .env.production}
      WS_TICKET_TTL_SEC: '60'
      UPLOADS_DIR: /data/uploads
      # Email главного администратора сервиса. Если переменной нет в
      # .env.production, панель /admin недоступна никому.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      # TURN (coturn) для прохождения NAT в звонках. Секрет совпадает со
      # static-auth-secret в /etc/turnserver.conf на хосте. Без них сервер
      # отдаёт клиенту только STUN.
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_URLS: ${TURN_URLS:-}
      TURN_TTL_SEC: ${TURN_TTL_SEC:-3600}
      # Токен kinopoisk.dev для поиска фильмов/сериалов (избранное в профиле).
      # Без него эндпоинт поиска отдаёт 503. Значение — в .env.production.
      KINOPOISK_TOKEN: ${KINOPOISK_TOKEN:-}
      # Web-Push (VAPID). Без пары ключей push-слой штатно отключается, остальное
      # работает. Значения — в .env.production (приватный ключ — секрет сервера).
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@vellin.ru}
    volumes:
      - uploads:/data/uploads

  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3 (QUIC)
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
