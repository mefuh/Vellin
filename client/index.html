<!doctype html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- БЕЗ viewport-fit=cover. На iOS standalone это заставляет iOS самому
         вписывать web-view в безопасную зону (под статус-баром, над home-indicator),
         а env(safe-area-inset-*) = 0 — никаких ручных отступов не нужно, интерфейс
         не сжимается и выглядит как в Safari. cover + ручные env-паддинги, наоборот,
         «съедали» высоту (header ниже, dock выше). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0807" />

    <!-- PWA: единый источник для display/scope/start_url/иконок. Без scope:'/'
         iOS в standalone выкидывает внутренние переходы в Safari. -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Apple PWA: standalone-режим на iOS (старее 16.4 манифест не читает —
         standalone включается именно этим мета). Заголовок/иконка/статус-бар. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Vellin" />
    <meta name="application-name" content="Vellin" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>Vellin — совместный просмотр</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=jetbrains-mono@400,500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Onest — «премиальный» дисплейный шрифт для hero-заголовков страниц профиля
         (см. --font-display). Остальное приложение остаётся на General Sans. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
